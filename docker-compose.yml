services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: app
    hostname: app
    ports:
      - "8000:8000"
      - "5173:5173"  # Para Vite HMR
    env_file:
      - .env
    volumes:
      - ./src:/var/www/html
      - ./.env:/var/www/html/.env
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - app-network
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    env_file:
      - .env
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: